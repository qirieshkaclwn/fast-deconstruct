name: Package and Release Mod

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Package Mod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read metadata from info.json
        id: metadata
        run: |
          MOD_NAME=$(jq -r '.name' info.json)
          MOD_VERSION=$(jq -r '.version' info.json)
          FOLDER_NAME="${MOD_NAME}_${MOD_VERSION}"
          echo "MOD_NAME=$MOD_NAME" >> $GITHUB_ENV
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV

      - name: Create package structure
        run: |
          mkdir -p "${{ env.FOLDER_NAME }}"
          # Copy all files to the subdirectory, excluding git, github and build artifacts
          rsync -Rr ./ "${{ env.FOLDER_NAME }}/" \
            --exclude="${{ env.FOLDER_NAME }}" \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".gitignore" \
            --exclude="*.zip" \
            --exclude="LICENSE" \
            --exclude="README.md"
          
          # Copy LICENSE and README.md to the root of the folder as well, but usually they are inside.
          # We excluded them from rsync because they are not needed inside the Factorio mod zip,
          # but we can copy them if we want. Factorio doesn't mind. Let's keep it clean.
          
          # Zip the folder
          zip -r "${{ env.FOLDER_NAME }}.zip" "${{ env.FOLDER_NAME }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FOLDER_NAME }}
          path: ${{ env.FOLDER_NAME }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.FOLDER_NAME }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
